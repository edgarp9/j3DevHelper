languages = [
    "Rust",
    "TypeScript",
    "JavaScript",
    "Python",
    "Go",
    "Java",
    "C#",
    "C",
    "C++",
    "Other",
]
categories = []

[view]
font_family = "Segoe UI"
font_size = 12
theme = "graphite"
ui_language = "en"
window_width = 352
window_height = 519
tree_panel_width = 160

[[tree_order]]
type = "workspace"
path = 'c:\'

[[workspaces]]
path = 'c:\'
name = 'c:\'
Language = "Other"

[[command_tabs]]
name = "base"

[[command_tabs.buttons]]
button_name = "Open VS Code"
executable_path = "code"
arguments = "{path}"
execution_type = "shell_api"

[[command_tabs.buttons]]
button_name = "Open Explorer"
executable_path = 'C:\Windows\explorer.exe'
arguments = "{path}"
execution_type = "shell_api"

[[command_tabs.buttons]]
button_name = "Open Android Studio"
executable_path = 'C:\Program Files\Android\Android Studio\bin\studio64.exe'
arguments = "{path}"
execution_type = "shell_api"

[[command_tabs.buttons]]
button_name = "Open Terminal"
executable_path = "cmd.exe"
arguments = "/K cd /D {path}"
execution_type = "shell_api"

[[command_tabs]]
name = "git"

[[command_tabs.buttons]]
button_name = "Status"
executable_path = "git"
arguments = "status --short --branch"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Diff"
executable_path = "git"
arguments = "diff"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Diff Staged"
executable_path = "git"
arguments = "diff --staged"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Log Graph"
executable_path = "git"
arguments = "log --oneline --graph --decorate --all -n 30"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Fetch Prune"
executable_path = "git"
arguments = "fetch --all --prune"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Pull FF Only"
executable_path = "git"
arguments = "pull --ff-only"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Add Patch"
executable_path = "git"
arguments = "add -p"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Commit"
executable_path = "git"
arguments = "commit"
execution_type = "external_terminal"

[[command_tabs.buttons]]
button_name = "Push"
executable_path = "git"
arguments = "push"
execution_type = "external_terminal"

